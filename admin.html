<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VibeFM Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
height:100vh;
overflow:hidden;
}

/* LOGIN */

#loginBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:#111827;
padding:25px;
border-radius:16px;
box-shadow:0 0 30px rgba(0,255,255,.2);
z-index:10;
}

#loginBox h2{
margin-bottom:15px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00ffaa;
color:black;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

/* PAINEL */

#panel{
display:none;
width:100%;
height:100vh;
display:flex;
}

/* RADIO */

.radio-side{
width:50%;
height:100%;
border-right:1px solid rgba(255,255,255,.1);
}

.radio-side iframe{
width:100%;
height:100%;
border:none;
}

/* CHAT */

.chat-side{
width:50%;
display:flex;
flex-direction:column;
background:#0b1220;
}

.top{
padding:15px;
border-bottom:1px solid rgba(255,255,255,.1);
font-size:20px;
font-weight:bold;
color:#00ffaa;
}

.chat-container{
display:flex;
flex:1;
overflow:hidden;
}

/* USERS */

.users{
width:35%;
border-right:1px solid rgba(255,255,255,.1);
overflow:auto;
padding:10px;
}

.user{
padding:12px;
margin-bottom:10px;
background:#111827;
border-radius:12px;
cursor:pointer;
transition:.2s;
}

.user:hover{
background:#1f2937;
}

/* MESSAGES */

.messages{
width:65%;
display:flex;
flex-direction:column;
}

#msgs{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
background:linear-gradient(45deg,#0f172a,#0ea5e9);
padding:10px;
border-radius:14px;
margin-bottom:10px;
max-width:80%;
color:white;
box-shadow:0 0 18px rgba(0,255,204,.12);
}

.msg.adm{
background:linear-gradient(45deg,#7c3aed,#c026d3);
margin-left:auto;
text-align:right;
box-shadow:0 0 22px rgba(192,38,211,.22);
}

.msg .badge{
display:inline-block;
font-size:11px;
font-weight:800;
padding:2px 8px;
border-radius:999px;
margin-bottom:6px;
background:rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.12);
}

.send-box{
display:flex;
padding:10px;
border-top:1px solid rgba(255,255,255,.1);
gap:10px;
}

.send-box input{
flex:1;
margin:0;
}

.send-box button{
width:70px;
}

/* MOBILE */

@media(max-width:900px){

#panel{
flex-direction:column;
}

.radio-side{
width:100%;
height:35%;
}

.chat-side{
width:100%;
height:65%;
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginBox">

<h2>🎧 VibeFM Admin</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Senha">

<button onclick="login()">ENTRAR</button>

</div>

<!-- PAINEL -->

<div id="panel">

<div class="radio-side">

<iframe src="https://radiovibefm.vibefmbr.workers.dev/"></iframe>

</div>

<div class="chat-side">

<div class="top">
💬 Painel de Ouvintes
</div>

<div class="chat-container">

<div class="users" id="users"></div>

<div class="messages">

<div id="msgs"></div>

<div class="send-box">

<input id="replyInput" placeholder="Responder ouvinte...">

<button onclick="sendReply()">
➤
</button>

</div>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp,getApps }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getDatabase,
ref,
push,
onValue,
set
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyCB3FZ7_ypaL5MN8AtvPkRCXzAwP0eymaM",

authDomain: "vibefm-radio-ad326.firebaseapp.com",

databaseURL:
"https://vibefm-radio-ad326-default-rtdb.firebaseio.com",

projectId: "vibefm-radio-ad326",

storageBucket: "vibefm-radio-ad326.appspot.com",

messagingSenderId: "1021295101262",

appId: "1:1021295101262:web:7b9e80e0287e041c494a1f"

};

const app =
getApps().length
? getApps()[0]
: initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

let currentUid = null;


/* LOGIN */

window.login = function(){

const email = document.getElementById("email").value;
const senha = document.getElementById("password").value;

// se abrir de novo, garante que ao fechar a aba a presença seja desativada
window.onbeforeunload = () => {
  set(ref(db, "onlineAdmins/main"), false);
};


if(!email || !senha) return;

signInWithEmailAndPassword(auth, email, senha)
.then(()=>{

// presença do ADM (para index.html)
set(ref(db, "onlineAdmins/main"), true);

document.getElementById("loginBox").style.display="none";

document.getElementById("panel").style.display="flex";
	
	loadUsers();
})
.catch((err)=>{
	alert(err.message);
});

};

/* USERS */

function loadUsers(){

const usersDiv =
document.getElementById("users");

onValue(ref(db,"mensagens"),snapshot=>{

const data = snapshot.val();

usersDiv.innerHTML = "";

if(!data) return;

const usersMap = {};

// listar ouvintes pelo uid, ignorando ADM
Object.entries(data).forEach(([id,msg])=>{

if(!msg || !msg.uid) return;

if(msg.admin === true) return;

usersMap[msg.uid] = msg.nome || "Ouvinte";

});

Object.entries(usersMap).forEach(([uid,nome])=>{

usersDiv.innerHTML += `

<div class="user"
onclick="openChat('${uid}','${nome}')">

👤 ${nome}

</div>

`;

});

});

}

/* CHAT */

window.openChat = function(uid,nome){

currentUid = uid;

const msgsDiv = document.getElementById("msgs");

// Se já existe um listener do chat aberto, remove para evitar duplicação.
if(window.__admChatUnsub){
  window.__admChatUnsub();
}

// listener único para o uid selecionado
window.__admChatUnsub = onValue(ref(db,"mensagens"),snapshot=>{

const data = snapshot.val();

msgsDiv.innerHTML = "";

if(!data) return;

Object.values(data).forEach(msg=>{

if(!msg || msg.uid !== uid) return;

msgsDiv.innerHTML += `

<div class="msg ${msg.admin === true ? 'adm' : ''}">

<div class="badge">${msg.admin === true ? 'ADM' : 'OUVINTE'}</div>

${msg.texto}

</div>

`;

});

msgsDiv.scrollTop = msgsDiv.scrollHeight;

});

};

/* RESPONDER */

window.sendReply = function(){

const input =
document.getElementById("replyInput");

if(!input.value.trim()) return;

push(ref(db,"mensagens"),{
uid: currentUid,
texto: input.value,
admin: true,
nome: "ADM",
timestamp: Date.now()
});

input.value="";

};

/* AUTO RESPOSTA */

window.autoReply = function(uid){

push(ref(db,"mensagens"),{

uid:uid,

texto:"🤖 Obrigado pela mensagem! Em breve o ADM vai responder você 🎧",

adm:true,

timestamp:Date.now()

});

};

</script>

</body>
</html>
