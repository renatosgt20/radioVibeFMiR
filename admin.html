<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin VibeFM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  margin:0;
}

#loginBox{
  width:320px;
  margin:100px auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

#panel{
  display:none;
  padding:20px;
}

.chat-box{
  display:flex;
  gap:20px;
}

.users{
  width:30%;
  background:#111827;
  padding:10px;
  border-radius:10px;
  height:80vh;
  overflow:auto;
}

.chat{
  width:70%;
  background:#111827;
  padding:10px;
  border-radius:10px;
  height:80vh;
  overflow:auto;
}

.user{
  padding:10px;
  margin:5px 0;
  background:#1f2937;
  border-radius:8px;
  cursor:pointer;
}

.msg{
  background:#1f2937;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Admin Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="panel">

  <h2>💬 Painel de Chats VibeFM</h2>

  <div class="chat-box">

    <div class="users" id="users">
      <b>Ouvintes</b>
    </div>

    <div class="chat">
      <h3 id="chatTitle">Selecione um usuário</h3>
      <div id="msgs"></div>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

// 🔥 CONFIG FIREBASE (CORRETO)
const firebaseConfig = {
  apiKey: "AIzaSyCB3FZ7_ypaL5MN8AtvPkRCXzAwP0eymaM",
  authDomain: "vibefm-radio-ad326.firebaseapp.com",
  projectId: "vibefm-radio-ad326",
  storageBucket: "vibefm-radio-ad326.appspot.com",
  messagingSenderId: "1021295101262",
  appId: "1:1021295101262:web:7b9e80e0287e041c494a1f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 VARIÁVEIS GLOBAIS
let currentUser = null;
let unsubscribeChat = null;

// =======================
// LOGIN
// =======================
window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
    loadUsers();
  })
  .catch(e=>{
    alert("Erro login: " + e.message);
  });
};

// =======================
// LISTA DE USUÁRIOS
// =======================
function loadUsers(){

  const usersDiv = document.getElementById("users");

  onSnapshot(collection(db, "mensagens"), (snap)=>{

    const usersMap = new Map();

    snap.forEach(doc=>{
      const data = doc.data();

      if(!data.uid) return;

      if(!usersMap.has(data.uid)){
        usersMap.set(data.uid, data.nome || "Anônimo");
      }
    });

    usersDiv.innerHTML = "<b>Ouvintes</b>";

    usersMap.forEach((nome, uid)=>{
      usersDiv.innerHTML += `
        <div class="user" onclick="openChat('${uid}','${nome}')">
          👤 ${nome}
        </div>
      `;
    });

  });
}

// =======================
// ABRIR CHAT
// =======================
window.openChat = function(uid, nome){

  currentUser = uid;

  document.getElementById("chatTitle").innerText = "Chat: " + nome;

  const msgsDiv = document.getElementById("msgs");

  // 🔴 evita duplicar listener
  if(unsubscribeChat) unsubscribeChat();

  // Se não houver createdAt salvo, o Firestore vai reclamar do orderBy.
  // Para não quebrar o admin, tentamos ordenar e, se falhar, exibimos sem order.
  let unsubscribeChatLocal = null;
  try {
    const q = query(
      collection(db, "mensagens"),
      orderBy("createdAt")
    );

    unsubscribeChatLocal = onSnapshot(q,(snap)=>{

      msgsDiv.innerHTML = "";

      snap.forEach(doc=>{
        const data = doc.data();

        // filtra usuário atual
        if(data.uid !== uid) return;

        msgsDiv.innerHTML += `
          <div class="msg">
            
            <i class="fa-solid fa-user"></i> ${data.mensagem || ""}
          </div>
        `;
      });

    });
  } catch (e) {
    const q = collection(db, "mensagens");
    unsubscribeChatLocal = onSnapshot(q,(snap)=>{
      msgsDiv.innerHTML = "";
      snap.forEach(doc=>{
        const data = doc.data();
        if(data.uid !== uid) return;
        msgsDiv.innerHTML += `
          <div class="msg">
            
            <i class="fa-solid fa-user"></i> ${data.mensagem || ""}
          </div>
        `;
      });
    });
  }

  unsubscribeChat = unsubscribeChatLocal;

};


</script>

</body>
</html>
