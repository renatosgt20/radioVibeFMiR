<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin VibeFM</title>

<!-- ÍCONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family: Arial;
  background: #0f172a;
  color: #fff;
  margin:0;
}

/* LOGIN */
#loginBox{
  width: 300px;
  margin: 100px auto;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

/* PAINEL */
#panel{
  display:none;
  padding:20px;
}

h2{
  margin-bottom:20px;
}

/* MENSAGENS */
.msg{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border-left:4px solid #22c55e;
  position:relative;
}

.msg i{
  margin-right:5px;
}

.del-btn{
  position:absolute;
  right:10px;
  top:10px;
  background:#ef4444;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.del-btn:hover{
  background:#dc2626;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2><i class="fa fa-lock"></i> Admin Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">

  <button onclick="login()">
    Entrar
  </button>
</div>

<!-- PAINEL -->
<div id="panel">
  <h2><i class="fa fa-comments"></i> Mensagens Recebidas</h2>
  <div id="msgs"></div>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";


// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCB3FZ7_ypaL5MN8AtvPkRCXzAwP0eymaM",
  authDomain: "vibefm-radio-ad326.firebaseapp.com",
  projectId: "vibefm-radio-ad326",
  storageBucket: "vibefm-radio-ad326.appspot.com",
  messagingSenderId: "1021295101262",
  appId: "1:1021295101262:web:7b9e80e0287e041c494a1f"
};


// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// LOGIN
window.login = function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    loadMessages();

  })
  .catch(err=>{
    alert("Erro: " + err.message);
  });

};


// MENSAGENS
function loadMessages(){

  const msgsDiv = document.getElementById("msgs");

  onSnapshot(collection(db, "mensagens"), (snapshot)=>{

    msgsDiv.innerHTML = "";

    if(snapshot.empty){
      msgsDiv.innerHTML = "<p>Nenhuma mensagem ainda...</p>";
      return;
    }

    snapshot.forEach((docSnap)=>{

      const data = docSnap.data();

      msgsDiv.innerHTML += `
        <div class="msg">
          <i class="fa fa-user"></i> <b>${data.nome || "Anônimo"}</b><br><br>
          <i class="fa fa-message"></i> ${data.mensagem || ""}

          <button class="del-btn" onclick="delMsg('${docSnap.id}')">
            <i class="fa fa-trash"></i>
          </button>
        </div>
      `;

    });

  });

}


// DELETE
window.delMsg = async function(id){
  await deleteDoc(doc(db, "mensagens", id));
};

</script>

</body>
</html>
