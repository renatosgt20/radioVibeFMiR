<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeFM Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
}

body {
  background: radial-gradient(circle at 20% 20%, rgba(0, 255, 204, 0.06), transparent 35%),
              radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.08), transparent 40%),
              #050816;
  color: #e2e8f0;
  height: 100vh;
  overflow: hidden;
}

/* LOGIN */
#loginBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 340px;
  max-width: 92vw;
  background: rgba(17, 24, 39, 0.95);
  padding: 32px 28px;
  border-radius: 20px;
  border: 1px solid rgba(0, 255, 204, 0.2);
  box-shadow: 0 0 40px rgba(0, 255, 204, 0.12);
  z-index: 10;
}

#loginBox h2 {
  margin-bottom: 6px;
  text-align: center;
  font-size: 1.4rem;
  color: #00ffcc;
}

#loginBox p {
  text-align: center;
  font-size: 0.85rem;
  color: #94a3b8;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 13px 14px;
  margin: 8px 0;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 12px;
  background: #0f172a;
  color: white;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
  border-color: rgba(0, 255, 204, 0.5);
  box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.1);
}

button {
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}

button:hover {
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
}

#loginBox button {
  width: 100%;
  padding: 13px;
  margin-top: 8px;
  background: linear-gradient(135deg, #00ffcc, #00d4aa);
  color: #041016;
  font-size: 0.95rem;
}

/* PAINEL */
#panel {
  display: none;
  flex-direction: column;
  width: 100%;
  height: 100vh;
}

/* HEADER */
.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 24px;
  background: rgba(11, 18, 32, 0.92);
  border-bottom: 1px solid rgba(0, 255, 204, 0.15);
  backdrop-filter: blur(12px);
  flex-shrink: 0;
}

.admin-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.admin-brand-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: linear-gradient(135deg, #00ffcc, #8a2be2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  box-shadow: 0 0 20px rgba(0, 255, 204, 0.25);
}

.admin-brand h1 {
  font-size: 1.15rem;
  color: #f8fafc;
  font-weight: 700;
}

.admin-brand span {
  display: block;
  font-size: 0.75rem;
  color: #64748b;
  font-weight: 400;
  margin-top: 2px;
}

.admin-header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.listener-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 999px;
  background: rgba(0, 255, 204, 0.08);
  border: 1px solid rgba(0, 255, 204, 0.25);
  color: #00ffcc;
  font-size: 0.85rem;
  font-weight: 600;
}

.listener-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 10px #22c55e;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

.btn-logout {
  padding: 8px 16px;
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.35);
  color: #fca5a5;
  font-size: 0.82rem;
  border-radius: 10px;
}

.btn-logout:hover {
  background: rgba(239, 68, 68, 0.25);
}

/* CORPO DO PAINEL */
.admin-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* LISTA DE OUVINTES */
.users-panel {
  width: 280px;
  min-width: 220px;
  display: flex;
  flex-direction: column;
  background: rgba(8, 12, 24, 0.85);
  border-right: 1px solid rgba(255, 255, 255, 0.06);
}

.users-panel-header {
  padding: 16px 18px 12px;
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #64748b;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.users {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.users::-webkit-scrollbar,
#msgs::-webkit-scrollbar {
  width: 5px;
}

.users::-webkit-scrollbar-thumb,
#msgs::-webkit-scrollbar-thumb {
  background: rgba(0, 255, 204, 0.25);
  border-radius: 99px;
}

.user {
  padding: 12px 14px;
  margin-bottom: 8px;
  background: rgba(17, 24, 39, 0.8);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  position: relative;
  font-size: 0.9rem;
}

.user:hover {
  background: rgba(31, 41, 55, 0.9);
  border-color: rgba(0, 255, 204, 0.2);
}

.user.active {
  background: rgba(0, 255, 204, 0.08);
  border-color: rgba(0, 255, 204, 0.4);
  box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
}

.user .new-indicator {
  display: none;
  position: absolute;
  top: 10px;
  right: 12px;
  font-size: 9px;
  font-weight: 900;
  color: #ff2d55;
}

.user.has-new {
  border-color: rgba(0, 255, 204, 0.35);
  box-shadow: 0 0 18px rgba(0, 255, 204, 0.15);
  animation: admPulse 1.1s ease-in-out infinite;
}

.user.has-new .new-indicator {
  display: block;
}

@keyframes admPulse {
  0%, 100% { box-shadow: 0 0 12px rgba(0, 255, 204, 0.12); }
  50% { box-shadow: 0 0 24px rgba(0, 255, 204, 0.28); }
}

.users-empty {
  padding: 24px 16px;
  text-align: center;
  color: #475569;
  font-size: 0.85rem;
  line-height: 1.5;
}

/* CHAT */
.chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: rgba(11, 18, 32, 0.6);
  min-width: 0;
}

.chat-panel-header {
  padding: 14px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
}

.chat-panel-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: #f1f5f9;
}

.chat-panel-title span {
  color: #00ffcc;
}

.btn-delete-all {
  padding: 7px 12px;
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #f87171;
  font-size: 0.78rem;
  border-radius: 8px;
  white-space: nowrap;
}

.btn-delete-all:hover {
  background: rgba(239, 68, 68, 0.22);
}

#msgs {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #475569;
  gap: 12px;
  padding: 40px;
  text-align: center;
}

.chat-placeholder i {
  font-size: 2.5rem;
  opacity: 0.4;
}

.msg {
  background: linear-gradient(135deg, #0f172a, #1e3a5f);
  padding: 12px 14px;
  border-radius: 16px;
  max-width: 75%;
  color: #e2e8f0;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
  align-self: flex-start;
  word-break: break-word;
}

.msg.adm {
  background: linear-gradient(135deg, #6d28d9, #a855f7);
  align-self: flex-end;
  text-align: right;
  box-shadow: 0 2px 16px rgba(168, 85, 247, 0.25);
}

.msg .badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 999px;
  margin-bottom: 6px;
  background: rgba(0, 0, 0, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.12);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.msg .del-btn {
  margin-top: 8px;
  padding: 4px 10px;
  background: rgba(239, 68, 68, 0.2);
  border: 1px solid rgba(239, 68, 68, 0.35);
  border-radius: 6px;
  color: #fca5a5;
  font-size: 10px;
  cursor: pointer;
}

.send-box {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
  background: rgba(8, 12, 24, 0.9);
  flex-shrink: 0;
}

.send-box input {
  flex: 1;
  margin: 0;
  padding: 13px 16px;
  border-radius: 14px;
  background: #0f172a;
  font-size: 0.92rem;
}

.send-box input:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.btn-send {
  width: 48px;
  height: 48px;
  min-width: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, #00ffcc, #00d4aa);
  color: #041016;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
}

.btn-send:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.send-hint {
  font-size: 0.72rem;
  color: #475569;
  padding: 0 20px 10px;
  background: rgba(8, 12, 24, 0.9);
}

@media (max-width: 768px) {
  .admin-header {
    padding: 12px 14px;
    flex-wrap: wrap;
  }

  .admin-body {
    flex-direction: column;
  }

  .users-panel {
    width: 100%;
    max-height: 35vh;
    border-right: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .listener-badge {
    font-size: 0.78rem;
    padding: 6px 12px;
  }
}
</style>

<script>
(function() {
  console.log('🎵 Inicializando listeners do Admin...');

  // Aguarda o player estar pronto (NO painel do admin, não deve dar spam de console)
  function waitForPlayer(retries = 20) {
    const audio = document.getElementById('audio');

    if (audio) {
      console.log('✅ Player encontrado!');
      setupListeners(audio);
      return;
    }

    if (retries <= 0) {
      console.log('⚠️ Player não encontrado no admin (parando tentativas).');
      return;
    }

    // reduz spam: loga só a cada 5 tentativas
    if (retries % 5 === 0) {
      console.log('⏳ Aguardando player no admin...');
    }

    setTimeout(function() {
      waitForPlayer(retries - 1);
    }, 1000);
  }


  function setupListeners(audio) {
    
    // ============================================================
    // LISTENER: PLAY/PAUSE
    // ============================================================
    // Observação: no painel do admin NÃO pode iniciar o áudio sozinho.
    // Então este listener só PAUSA quando o evento pedir.
    // O play deve acontecer apenas pelo usuário no site principal.
    window.addEventListener('playerTogglePlay', function(e) {
      console.log('🎵 Admin: Toggle Play/Pause', e.detail);
      
      const shouldPlay = e.detail && e.detail.isPlaying;
      
      // Só atua no PAUSE.
      if (!shouldPlay) {
        if (!audio.paused) {
          audio.pause();
          console.log('⏸️ Pausado pelo Admin');
        }
      }
    });


    // ============================================================
    // LISTENER: PRÓXIMA MÚSICA
    // ============================================================
    window.addEventListener('playerNextTrack', function() {
      console.log('⏭️ Admin: Próxima música');
      
      if (typeof window.proximaMusica === 'function') {
        window.proximaMusica();
      } else {
        // Fallback: recarrega
        audio.pause();
        setTimeout(function() {
          audio.load();
          audio.play().catch(function() {});
        }, 200);
      }
    });

    // ============================================================
    // LISTENER: MÚSICA ANTERIOR
    // ============================================================
    window.addEventListener('playerPreviousTrack', function() {
      console.log('⏮️ Admin: Música anterior');
      
      // Tenta usar indexMusicaNaFase do radio2.js
      if (typeof window.indexMusicaNaFase !== 'undefined' && typeof window.proximaMusica === 'function') {
        if (window.indexMusicaNaFase > 0) {
          window.indexMusicaNaFase = window.indexMusicaNaFase - 2;
          window.proximaMusica();
        } else {
          window.indexMusicaNaFase = 0;
          window.proximaMusica();
        }
      } else {
        // Fallback: volta início da música
        if (audio.src) {
          audio.currentTime = 0;
          if (audio.paused) {
            audio.play().catch(function() {});
          }
        }
      }
    });

    console.log('✅ Listeners do Admin registrados com sucesso!');
  }

  // Inicia
  waitForPlayer();
})();

// ========= TOGGLE COMPAT (corrige caso scripts esperem tocarRadio/tocarMusica via evento) =========
// Alguns browsers podem impedir play() sem ação do usuário; por isso também tenta toggle do player principal.
</script>

<script type="module">

import { initializeApp, getApps }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
  getDatabase,
  ref,
  push,
  onValue,
  set,
  remove
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhPqHUawzslFddbo0lQ9X2VCKHLt0WyIU",
  authDomain: "vibezonefm.firebaseapp.com",
  databaseURL: "https://vibezonefm-default-rtdb.firebaseio.com/",
  projectId: "vibezonefm",
  storageBucket: "vibezonefm.firebasestorage.app",
  messagingSenderId: "962940256886",
  appId: "1:962940256886:web:e1c6e69f31d4f7cb1f5557",
  measurementId: "G-1CCHE01VC4"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let selectedChatUid = null;
let selectedNome = null;
let adminUnsubMessages = null;
let usersLoaded = false;
let listenerCounterStarted = false;
let renderedMap = {};

function setPanelVisible(visible) {
  const panel = document.getElementById("panel");
  const loginBox = document.getElementById("loginBox");
  if (!panel || !loginBox) return;

  if (visible) {
    panel.style.display = "flex";
    loginBox.style.display = "none";
  } else {
    panel.style.display = "none";
    loginBox.style.display = "block";
  }
}

window.requireAdmAuth = function () {
  return !!auth?.currentUser;
};

window.login = function () {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("password").value;
  if (!email || !senha) return;

  signInWithEmailAndPassword(auth, email, senha)
    .catch((err) => {
      console.error(err);
      alert((err.code || "auth_error") + " - " + (err.message || err));
    });
};

window.logout = function () {
  signOut(auth).catch(console.error);
};

function setGlobalAdminGuards(enabled) {
  window.__admEnabled = enabled;
}

function lockAdminActions() {
  setGlobalAdminGuards(false);
  try {
    if (window.__admChatUnsub) window.__admChatUnsub();
  } catch (_) {}
}

function unlockAdminActions() {
  setGlobalAdminGuards(true);
}

function setAdmPresenceOnline(isOnline) {
  try {
    set(ref(db, "onlineAdmins/main"), !!isOnline);
  } catch (_) {}
}

function startListenerCounter() {
  if (listenerCounterStarted) return;
  listenerCounterStarted = true;

  onValue(ref(db, "onlineListeners"), (snap) => {
    const data = snap.val() || {};
    const total = Object.keys(data).length;
    const el = document.getElementById("ouvintesOnline");
    if (el) el.textContent = total;
  });
}

function setChatEnabled(enabled) {
  const input = document.getElementById("replyInput");
  const btn = document.getElementById("btnSend");
  if (input) input.disabled = !enabled;
  if (btn) btn.disabled = !enabled;
}

function ensureAdminState() {
  if (!window.requireAdmAuth()) {
    setPanelVisible(false);
    lockAdminActions();
    setAdmPresenceOnline(false);
    return;
  }

  setPanelVisible(true);
  unlockAdminActions();
  startListenerCounter();

  if (!usersLoaded) {
    loadUsers();
    usersLoaded = true;
  }

  setAdmPresenceOnline(true);
}

onAuthStateChanged(auth, (user) => {
  if (!user) {
    setAdmPresenceOnline(false);
    setPanelVisible(false);
    lockAdminActions();
    selectedChatUid = null;
    selectedNome = null;
    listenerCounterStarted = false;
    usersLoaded = false;
    return;
  }

  ensureAdminState();
});

window.addEventListener("pagehide", () => {
  if (window.requireAdmAuth()) setAdmPresenceOnline(false);
}, { once: false });

// Sync da programação do player (usa o estado salvo no painel do site)
// - Programa atual: texto de PROGRAMAS[pastaAtual]
// - Arquivo tocando: url atual (musica)
function setAdmProgramacaoUI(programa, arquivo) {
  const elPrograma = document.getElementById('admProgramaAtual');
  const elArquivo = document.getElementById('admArquivoAtual');

  const progTxt = (programa && String(programa).trim()) ? String(programa) : '';
  const fileTxt = (arquivo && String(arquivo).trim()) ? String(arquivo) : '';

  if (elPrograma) elPrograma.textContent = progTxt || '— (sem dados)';
  if (elArquivo) elArquivo.textContent = fileTxt || '— (sem dados)';

  // Links: se vier URL, coloca no href (mantém visual igual).
  try {
    if (elPrograma && (programa || '').startsWith('http')) elPrograma.href = programa;
    if (elArquivo && (arquivo || '').startsWith('http')) elArquivo.href = arquivo;
  } catch (_) {}
}

// Debug rápido para entender por que não chega nada no painel.
function debugAdmProgramacaoStorage() {
  try {
    const raw = localStorage.getItem('vibe_radio_now');
    const elPrograma = document.getElementById('admProgramaAtual');
    const elArquivo = document.getElementById('admArquivoAtual');

    if (elPrograma && !raw) elPrograma.textContent = '— (localStorage vazio)';
    if (elArquivo && !raw) elArquivo.textContent = '— (localStorage vazio)';

    if (raw && (elPrograma || elArquivo)) {
      const obj = JSON.parse(raw);
      // não altera layout: só mostra um resumo em caso de falha
      if (elPrograma) elPrograma.title = 'vibe_radio_now=' + raw;
      if (elArquivo) elArquivo.title = 'vibe_radio_now=' + raw;
    }
  } catch (e) {
    // ignora
  }
}



function getProgFromStorage() {
  try {
    const obj = JSON.parse(localStorage.getItem('vibe_radio_now') || '{}');
    return {
      programa: obj.programaAtual,
      arquivo: obj.arquivoAtual
    };
  } catch (_) {
    return { programa: '—', arquivo: '—' };
  }
}

(function syncNowFromStorage(){
  try {
    debugAdmProgramacaoStorage();
    const now = getProgFromStorage();
    setAdmProgramacaoUI(now.programa, now.arquivo);
  } catch (_) {}
})();


window.addEventListener('storage', (e) => {
  if (!e || e.key !== 'vibe_radio_now') return;
  try {
    const now = getProgFromStorage();
    setAdmProgramacaoUI(now.programa, now.arquivo);
  } catch (_) {}
});

function loadUsers() {
  const usersDiv = document.getElementById("users");
  renderedMap = renderedMap || {};

  onValue(ref(db, "mensagens"), (snapshot) => {
    const data = snapshot.val();
    usersDiv.innerHTML = "";

    if (!data) {
      usersDiv.innerHTML = '<div class="users-empty">Nenhum ouvinte ainda.<br>Aguardando mensagens...</div>';
      return;
    }

    const usersMap = {};

    Object.entries(data).forEach(([, msg]) => {
      if (!msg || !msg.uid || msg.admin === true) return;
      usersMap[msg.uid] = msg.nome || "Ouvinte";
    });

    Object.entries(data).forEach(([, msg]) => {
      if (!msg || !msg.uid || msg.admin === true) return;
      const last = renderedMap[msg.uid]?.lastSeen || 0;
      if ((msg.timestamp || 0) > last) {
        renderedMap[msg.uid] = renderedMap[msg.uid] || { lastSeen: last };
        renderedMap[msg.uid].hasNew = true;
      }
    });

    const entries = Object.entries(usersMap);
    if (!entries.length) {
      usersDiv.innerHTML = '<div class="users-empty">Nenhum ouvinte ainda.<br>Aguardando mensagens...</div>';
      return;
    }

    entries.forEach(([uid, nome]) => {
      const state = renderedMap[uid] || { lastSeen: 0, hasNew: false };
      const hasNew = !!state.hasNew;
      const isActive = uid === selectedChatUid;
      const clazz = `user${hasNew ? " has-new" : ""}${isActive ? " active" : ""}`;
      const safeNome = nome.replace(/'/g, "\\'");

      usersDiv.innerHTML += `
        <div class="${clazz}" data-uid="${uid}" onclick="openChat('${uid}','${safeNome}')">
          👤 ${nome}
          <span class="new-indicator">●</span>
        </div>
      `;
    });
  });
}

window.msgKeysMap = {};

window.openChat = function (uid, nome) {
  if (!window.requireAdmAuth()) {
    alert("Faça login como ADM.");
    return;
  }

  selectedChatUid = uid;
  selectedNome = nome;

  document.getElementById("chatTitle").innerHTML =
    `Conversa com <span>${nome}</span>`;

  setChatEnabled(true);

  if (renderedMap[uid]) {
    renderedMap[uid].hasNew = false;
    renderedMap[uid].lastSeen = Date.now();
  }

  document.querySelectorAll(".user").forEach((el) => {
    el.classList.toggle("active", el.dataset.uid === uid);
  });

  const msgsDiv = document.getElementById("msgs");

  if (window.__admChatUnsub) window.__admChatUnsub();

  window.msgKeysMap[uid] = [];

  window.__admChatUnsub = onValue(ref(db, "mensagens"), (snapshot) => {
    const data = snapshot.val();
    msgsDiv.innerHTML = "";

    if (!data) return;

    window.msgKeysMap[uid] = [];

    Object.entries(data).forEach(([key, msg]) => {
      if (!msg || msg.uid !== uid) return;

      window.msgKeysMap[uid].push(key);

      const delBtn = msg.admin !== true
        ? `<button class="del-btn" onclick="excluirMsg('${key}')">🗑 Excluir</button>`
        : "";

      msgsDiv.innerHTML += `
        <div class="msg ${msg.admin === true ? "adm" : ""}">
          <div class="badge">${msg.admin === true ? "ADM" : "OUVINTE"}</div>
          ${msg.texto}
          ${delBtn}
        </div>
      `;
    });

    msgsDiv.scrollTop = msgsDiv.scrollHeight;
  });

  document.getElementById("replyInput")?.focus();
};

window.sendReply = function () {
  if (!window.requireAdmAuth()) {
    alert("Faça login como ADM.");
    return;
  }

  if (!selectedChatUid) {
    alert("Selecione um ouvinte primeiro.");
    return;
  }

  const input = document.getElementById("replyInput");
  const texto = input.value.trim();
  if (!texto) return;

  push(ref(db, "mensagens"), {
    uid: selectedChatUid,
    texto,
    admin: true,
    nome: "ADM",
    timestamp: Date.now()
  });

  input.value = "";
};

window.excluirMsg = function (key) {
  if (!window.requireAdmAuth()) {
    alert("Faça login como ADM.");
    return;
  }
  if (!confirm("Excluir esta mensagem?")) return;
  remove(ref(db, "mensagens/" + key));
};

window.excluirTudo = async function () {
  if (!window.requireAdmAuth()) {
    alert("Faça login como ADM.");
    return;
  }
  if (!confirm("Excluir TODAS as mensagens do chat?")) return;

  try {
    await remove(ref(db, "mensagens"));
    try { localStorage.removeItem("vibe_chat_rendered"); } catch (_) {}
    selectedChatUid = null;
    selectedNome = null;
    setChatEnabled(false);
    document.getElementById("chatTitle").textContent = "Selecione um ouvinte";
    document.getElementById("msgs").innerHTML = `
      <div class="chat-placeholder">
        <i class="fa-solid fa-comments"></i>
        <p>Selecione um ouvinte na lista<br>para ver e responder mensagens</p>
      </div>
    `;
  } catch (e) {
    console.error(e);
    alert("Falha ao excluir mensagens.");
  }
};

document.getElementById("replyInput")?.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendReply();
  }
});

document.getElementById("password")?.addEventListener("keydown", (e) => {
  if (e.key === "Enter") login();
});

</script>
