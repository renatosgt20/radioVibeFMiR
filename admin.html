<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin VibeFM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  margin:0;
}

#loginBox{
  width:320px;
  margin:100px auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

#panel{
  display:none;
  padding:20px;
}

/* CHAT STYLE */
.chat-box{
  display:flex;
  gap:20px;
}

.users{
  width:30%;
  background:#111827;
  padding:10px;
  border-radius:10px;
  height:80vh;
  overflow:auto;
}

.chat{
  width:70%;
  background:#111827;
  padding:10px;
  border-radius:10px;
  height:80vh;
  overflow:auto;
}

.user{
  padding:10px;
  margin:5px 0;
  background:#1f2937;
  border-radius:8px;
  cursor:pointer;
}

.msg{
  background:#1f2937;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Admin Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="panel">

  <h2>💬 Painel de Chats</h2>

  <div class="chat-box">

    <div class="users" id="users">
      <b>Ouvintes</b>
    </div>

    <div class="chat">
      <h3 id="chatTitle">Selecione um usuário</h3>
      <div id="msgs"></div>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCB3FZ7_ypaL5MN8AtvPkRCXzAwP0eymaM",
  authDomain: "vibefm-radio-ad326.firebaseapp.com",
  projectId: "vibefm-radio-ad326",
  storageBucket: "vibefm-radio-ad326.appspot.com",
  messagingSenderId: "1021295101262",
  appId: "1:1021295101262:web:7b9e80e0287e041c494a1f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// LOGIN
window.login = function(){

  const email = email.value;
  const password = password.value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{

    loginBox.style.display="none";
    panel.style.display="block";

    loadUsers();

  })
  .catch(e=>alert(e.message));

};

// LISTA DE USUÁRIOS (simples agrupamento)
function loadUsers(){

  const usersDiv = document.getElementById("users");

  onSnapshot(collection(db, "mensagens"), (snap)=>{

    let users = new Set();

    snap.forEach(doc=>{
      users.add(doc.data().nome || "Anônimo");
    });

    usersDiv.innerHTML = "<b>Ouvintes</b>";

    users.forEach(u=>{
      usersDiv.innerHTML += `
        <div class="user" onclick="openChat('${u}')">
          👤 ${u}
        </div>
      `;
    });

  });

}

// ABRIR CHAT
window.openChat = function(user){

  currentUser = user;
  chatTitle.innerText = "Chat: " + user;

  const msgsDiv = document.getElementById("msgs");

  const q = query(collection(db,"mensagens"), where("nome","==",user));

  onSnapshot(q,(snap)=>{

    msgsDiv.innerHTML="";

    snap.forEach(d=>{
      msgsDiv.innerHTML += `
        <div class="msg">
          💬 ${d.data().mensagem}
        </div>
      `;
    });

  });

};

</script>

</body>
</html>
