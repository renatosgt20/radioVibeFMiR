<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Vibe FM</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #020024, #000000);
    font-family: Arial, sans-serif;
    color: #00ffcc;
    text-align: center;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    box-shadow:
      0 0 40px rgba(138, 43, 226, 0.6),
      0 0 80px rgba(0, 0, 139, 0.6);
    pointer-events: none;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  .conteudo {
    position: relative;
    z-index: 1;
    margin-top: 80px;
  }

  .titulo {
    font-size: 60px;
    text-shadow:
      0 0 10px #00ffcc,
      0 0 20px #8a2be2;
  }

  button {
    margin-top: 30px;
    padding: 15px 45px;
    font-size: 18px;
    background: transparent;
    border: 2px solid #00ffcc;
    color: #00ffcc;
    border-radius: 30px;
    cursor: pointer;
  }

  button:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 20px #00ffcc, 0 0 40px #8a2be2;
  }

  .equalizer {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 5px;
    height: 40px;
  }

  .bar {
    width: 5px;
    height: 10px;
    background: #00ffcc;
    animation: som 1s infinite;
    animation-play-state: paused;
  }

  .bar:nth-child(2) { animation-delay: 0.2s; }
  .bar:nth-child(3) { animation-delay: 0.4s; }
  .bar:nth-child(4) { animation-delay: 0.6s; }
  .bar:nth-child(5) { animation-delay: 0.8s; }

  @keyframes som {
    0% { height: 10px; }
    50% { height: 40px; }
    100% { height: 10px; }
  }

  /* 💬 botão chat */
  #chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00ffcc;
    color: black;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 25px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 0 15px #00ffcc;
    z-index: 10;
  }

  /* 💬 caixa do chat */
  #chat-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 250px;
    height: 300px;
    background: rgba(0,0,0,0.9);
    border: 1px solid #00ffcc;
    border-radius: 10px;
    padding: 10px;
    display: none;
    flex-direction: column;
    z-index: 10;
  }

  #mensagens {
    flex: 1;
    overflow-y: auto;
    font-size: 12px;
    margin-bottom: 5px;
  }

  #input-msg {
    width: 70%;
    background: black;
    color: #00ffcc;
    border: 1px solid #00ffcc;
  }

  #chat-box button {
    width: 25%;
    margin-top: 5px;
  }
</style>
</head>

<body>

<canvas id="espaco"></canvas>

<div class="conteudo">
  <div class="titulo">🎧 VIBE FM 🔊</div>

  <p>🌌 Rádio digital Online ⚡ - PA-Brasil 🚀 </p>

  <button onclick="tocar()"> ▶ OUVIR AGORA</button>

  <div class="equalizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <audio id="audio" src="musica.mp3"></audio>
</div>

<!-- 💬 CHAT -->
<div id="chat-btn" onclick="toggleChat()">💬</div>

<div id="chat-box">
  <div id="mensagens"></div>

  <div>
    <input id="input-msg" placeholder="Digite...">
    <button onclick="enviarMsg()">➤</button>
  </div>
</div>

<script>
  function tocar() {
    const audio = document.getElementById("audio");
    audio.play();

    document.querySelectorAll(".bar").forEach(bar => {
      bar.style.animationPlayState = "running";
    });
  }

  function toggleChat() {
    const chat = document.getElementById("chat-box");
    chat.style.display = (chat.style.display === "none") ? "flex" : "none";
  }

  function enviarMsg() {
    const input = document.getElementById("input-msg");
    const mensagens = document.getElementById("mensagens");

    if (input.value.trim() === "") return;

    const msg = document.createElement("div");
    msg.textContent = "Você: " + input.value;

    mensagens.appendChild(msg);
    input.value = "";
    mensagens.scrollTop = mensagens.scrollHeight;
  }

  const canvas = document.getElementById("espaco");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let estrelas = [];

  for (let i = 0; i < 700; i++) {
    estrelas.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      z: Math.random() * canvas.width
    });
  }

  function animar() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < estrelas.length; i++) {
      let e = estrelas[i];

      e.z -= 1.5;
      if (e.z <= 0) e.z = canvas.width;

      let x = (e.x - canvas.width / 2) * (canvas.width / e.z) + canvas.width / 2;
      let y = (e.y - canvas.height / 2) * (canvas.width / e.z) + canvas.height / 2;

      let tamanho = (1 - e.z / canvas.width) * 3;

      ctx.fillStyle = "#00ffcc";
      ctx.fillRect(x, y, tamanho, tamanho);
    }

    requestAnimationFrame(animar);
  }

  animar();
</script>

</body>
</html>
